<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joker Quiz</title>

<style>
body {
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont;
    background:#000;
    color:white;
}

.container {
    max-width:500px;
    margin:auto;
    padding:20px;
}

.logo img {
    width:120px;
    display:block;
    margin:auto;
}

.title {
    text-align:center;
    font-size:22px;
    margin:20px;
}

.card {
    background:#1c1c1e;
    padding:20px;
    border-radius:20px;
    margin:10px 0;
    cursor:pointer;
    transition:0.2s;
}

.card:hover {
    transform:scale(1.02);
}

.card span {
    display:block;
    font-size:14px;
    opacity:0.6;
}

.hidden { display:none; }

#question {
    font-size:22px;
    margin-bottom:20px;
}

#answers button {
    width:100%;
    padding:15px;
    margin:6px 0;
    border:none;
    border-radius:12px;
    background:#2c2c2e;
    color:white;
    font-size:16px;
}

.correct { background:#34c759 !important; }
.wrong { background:#ff3b30 !important; }

.progress-bar {
    height:6px;
    background:#333;
    border-radius:10px;
    margin-bottom:10px;
}

#progress {
    height:100%;
    background:#0a84ff;
    width:0%;
    border-radius:10px;
}

.joker, .next {
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

.joker { background:gold; color:black; }
.next { background:#0a84ff; color:white; }

#timer {
    text-align:center;
    margin-top:10px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="jokerhut.jpg">
</div>

<div class="title">Joker Quiz</div>

<!-- MENÜ -->
<div id="menu">

<div class="card" onclick="startQuiz('xabcd')">
xABCDE
<span>Initiale Beurteilung</span>
</div>

<div class="card" onclick="startQuiz('labor')">
Laborwerte
<span>Normwerte & Röhrchen</span>
</div>

<div class="card" onclick="startQuiz('med')">
Medikamente
<span>Indikation, Dosis, Nebenwirkung</span>
</div>

<div class="card" onclick="startQuiz('ekg')">
EKG Kurs
<span>Erkennen & Befunden</span>
</div>

<div class="card" onclick="startQuiz('ludwig')">
Dr. Ludwig
<span>Polytrauma & Internistisch</span>
</div>

<div class="card" onclick="startQuiz('miranda')">
Miranda
<span>Immobilisation & Positionierung</span>
</div>

<div class="card" onclick="startQuiz('wrong')">
Meine Schwächen
<span>Falsch beantwortet</span>
</div>

</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">

<div class="progress-bar">
<div id="progress"></div>
</div>

<div id="counter"></div>

<div id="question"></div>

<div id="answers"></div>

<button class="joker" onclick="useJoker()">Joker einsetzen</button>
<button class="next" onclick="nextQuestion()">Nächste Frage</button>

<div id="timer"></div>

</div>

</div>

<script>

let current = [];
let index = 0;
let score = 0;
let wrong = [];
let timer;
let time = 25;

function shuffle(a){
    return a.sort(()=>Math.random()-0.5);
}

function startQuiz(type){

    document.getElementById("menu").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    if(type === "wrong"){
        current = wrong;
    } else {
        current = shuffle([...questions[type]]);
    }

    index = 0;
    score = 0;

    load();
}

function load(){

    if(index >= current.length){
        alert("Fertig: "+score+" von "+current.length);
        location.reload();
        return;
    }

    let q = current[index];

    document.getElementById("question").innerText = q.frage;

    let answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    let shuffled = shuffle([...q.antworten]);

    shuffled.forEach(a=>{
        let btn = document.createElement("button");
        btn.innerText = a;
        btn.onclick = ()=>check(btn,a,q);
        answersDiv.appendChild(btn);
    });

    document.getElementById("counter").innerText =
    "Frage "+(index+1)+" von "+current.length;

    document.getElementById("progress").style.width =
    ((index+1)/current.length*100)+"%";

    startTimer();
}

function check(btn,selected,q){

    clearInterval(timer);

    let correct = q.antworten[q.richtig];

    document.querySelectorAll("#answers button").forEach(b=>{
        if(b.innerText === correct) b.classList.add("correct");
    });

    if(selected === correct){
        btn.classList.add("correct");
        score++;
    } else {
        btn.classList.add("wrong");
        wrong.push(q);
    }
}

function nextQuestion(){
    index++;
    load();
}

function startTimer(){
    time = 25;

    document.getElementById("timer").innerText = "Zeit: "+time;

    timer = setInterval(()=>{
        time--;
        document.getElementById("timer").innerText = "Zeit: "+time;

        if(time <= 0){
            clearInterval(timer);
            wrong.push(current[index]);
        }
    },1000);
}

function useJoker(){

    let correct = current[index].antworten[current[index].richtig];

    document.querySelectorAll("#answers button").forEach(b=>{
        if(b.innerText !== correct && Math.random() < 0.5){
            b.style.display = "none";
        }
    });
}

/* ===========================
   FRAGENBEREICHE
=========================== */

const questions = {

/* xABCDE */
xabcd: [
{frage:"Was bedeutet D im ABCDE?",antworten:["Disability","Diagnosis","Depth","Deficit"],richtig:0},
{frage:"Welches Schema zur Bewusstseinsbeurteilung?",antworten:["AVPU","ABCDE","SOFA","NEWS"],richtig:0}
],

/* LABOR */
labor: [
{frage:"Welches Röhrchen für Blutbild?",antworten:["EDTA","Serum","Citrat","Heparin"],richtig:0}
],

/* MEDIKAMENTE */
med: [
{frage:"ASS Indikation?",antworten:["ACS","Asthma","Hypotonie","Sepsis"],richtig:0},
{frage:"ACC Antidot für?",antworten:["Paracetamol","ASS","Insulin","Heparin"],richtig:0}
],

/* EKG */
ekg: [
{frage:"Unregelmäßiger Rhythmus ohne P-Wellen?",antworten:["Vorhofflimmern","Sinusrhythmus","AV-Block","STEMI"],richtig:0}
],

/* LUDWIG */
ludwig: [
{frage:"Was hat im Schockraum Priorität?",antworten:["ABCDE","Labor","Anamnese","CT"],richtig:0}
],

/* MIRANDA */
miranda: [
{frage:"Tourniquet wann?",antworten:["starke Blutung","leichte Blutung","Schmerz","Fieber"],richtig:0}
]

};

</script>

</body>
</html>
