<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notfallpflege Quiz</title>

<style>
body {
    margin:0;
    font-family:-apple-system;
    background:#f5f5f7;
    color:#111;
}

/* START SCREEN */

.start-screen {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.start-screen img {
    width:160px;
    margin-bottom:20px;
}

.start-title {
    font-size:28px;
    font-weight:700;
}

.start-sub {
    margin-top:10px;
    color:gray;
}

.start-btn {
    margin-top:40px;
    padding:18px 60px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:orange;
    color:white;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* MENU */

.menu {
    display:none;
    padding:20px;
}

.card {
    background:white;
    padding:20px;
    border-radius:20px;
    margin:10px 0;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* QUIZ */

.quiz {
    display:none;
    padding:20px;
}

#answers button {
    width:100%;
    padding:15px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    background:#eee;
}

.correct { background:#34c759 !important; }
.wrong { background:#ff3b30 !important; }

.progress {
    height:6px;
    background:#ddd;
    border-radius:10px;
}

.progress-bar {
    height:100%;
    width:0%;
    background:#007aff;
}

.joker, .next {
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
}

.joker { background:gold; }
.next { background:#007aff; color:white; }

</style>
</head>

<body>

<!-- START -->

<div class="start-screen" id="start">
<img src="jokerhut.jpg">
<div class="start-title">Notfallpflege Quiz</div>
<div class="start-sub">Trainiere Entscheidungen unter Zeitdruck</div>
<button class="start-btn" onclick="goMenu()">START</button>
</div>

<!-- MENU -->

<div class="menu" id="menu">

<div class="card" onclick="startQuiz('xabcd')">1. xABCDE</div>
<div class="card" onclick="startQuiz('labor')">2. Laborwerte</div>
<div class="card" onclick="startQuiz('med')">3. Medikamente</div>
<div class="card" onclick="startQuiz('ekg')">4. EKG</div>
<div class="card" onclick="startQuiz('ludwig')">5. Dr. Ludwig</div>
<div class="card" onclick="startQuiz('miranda')">6. Miranda</div>
<div class="card" onclick="startQuiz('wrong')">7. Meine Schwächen</div>

</div>

<!-- QUIZ -->

<div class="quiz" id="quiz">

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<div id="question"></div>
<div id="answers"></div>

<button class="joker" onclick="joker()">Joker</button>
<button class="next" onclick="next()">Weiter</button>

<div id="timer"></div>

</div>

<script>

let q=[],i=0,score=0,wrong=[],time=25,timer;

let correctSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3");
let wrongSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3");

function goMenu(){
    document.getElementById("start").style.display="none";
    document.getElementById("menu").style.display="block";
}

function startQuiz(type){

    document.getElementById("menu").style.display="none";
    document.getElementById("quiz").style.display="block";

    q = type==="wrong"?wrong:[...questions[type]].sort(()=>Math.random()-0.5);

    i=0; score=0;

    load();
}

function load(){

    if(i>=q.length){
        alert("Fertig "+score+"/"+q.length);
        location.reload();
        return;
    }

    let current=q[i];

    document.getElementById("question").innerText=current.frage;

    let answers=[...current.antworten].sort(()=>Math.random()-0.5);

    let div=document.getElementById("answers");
    div.innerHTML="";

    answers.forEach(a=>{
        let b=document.createElement("button");
        b.innerText=a;
        b.onclick=()=>check(b,a,current);
        div.appendChild(b);
    });

    document.getElementById("progress").style.width=((i+1)/q.length*100)+"%";

    startTimer();
}

function check(btn,a,current){

    clearInterval(timer);

    let correct=current.antworten[current.richtig];

    document.querySelectorAll("#answers button").forEach(b=>{
        if(b.innerText===correct) b.classList.add("correct");
    });

    if(a===correct){
        btn.classList.add("correct");
        score++;
        correctSound.play();
    } else {
        btn.classList.add("wrong");
        wrong.push(current);
        wrongSound.play();
    }
}

function next(){
    i++;
    load();
}

function startTimer(){
    time=25;
    document.getElementById("timer").innerText="Zeit: "+time;

    timer=setInterval(()=>{
        time--;
        document.getElementById("timer").innerText="Zeit: "+time;

        if(time<=0){
            clearInterval(timer);
            wrong.push(q[i]);
        }
    },1000);
}

function joker(){
    let correct=q[i].antworten[q[i].richtig];

    document.querySelectorAll("#answers button").forEach(b=>{
        if(b.innerText!==correct && Math.random()<0.5){
            b.style.display="none";
        }
    });
}

const questions={
xabcd:[
{frage:"Was bedeutet D im ABCDE?",antworten:["Disability","Diagnosis","Depth","Deficit"],richtig:0}
],
labor:[],
med:[],
ekg:[],
ludwig:[],
miranda:[]
};

</script>

</body>
</html>
